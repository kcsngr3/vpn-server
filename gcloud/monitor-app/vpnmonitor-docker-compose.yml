services:
  monitor:
    build: .
    container_name: vpn_monitor
    restart: unless-stopped
    environment:
      DB_DSN:        "postgres://vpnadmin:vpnadmin_central@pg-central:5432/vpndb?sslmode=disable"
      LISTEN_ADDR:   ":8080"
      POLL_INTERVAL: "5s"
    ports:
      - "8080:8080"
    networks:
      - pg_network

networks:
  pg_network:
    external: true
    name: gcloud_default
